name: Feature request
description: Propose a new capability that fits the DueCheck engine.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Keep it concrete and deterministic.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Adapter
        - Ledger
        - Delta
        - Risk scoring
        - CLI
        - Docs
        - Release / CI
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What should this not turn into?
      placeholder: Avoid AI coaching, write-back LMS actions, or school-specific behavior.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
