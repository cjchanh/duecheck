name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: duecheck-dist
          path: dist/*
          if-no-files-found: error

  test-install:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Download distributions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: duecheck-dist
          path: dist

      - name: Smoke test installed wheel
        run: |
          python -m venv .venv-smoke
          .venv-smoke/bin/pip install --upgrade pip
          .venv-smoke/bin/pip install dist/duecheck-*.whl
          tmpout="$(mktemp -d /tmp/duecheck-gh-smoke-XXXXXX)"
          .venv-smoke/bin/duecheck --help
          .venv-smoke/bin/duecheck demo --out-dir "$tmpout" --json
          .venv-smoke/bin/duecheck verify --out-dir "$tmpout" --json
          .venv-smoke/bin/duecheck report --html --out-dir "$tmpout"
          .venv-smoke/bin/python -c "import importlib.resources as r; demo = r.files('duecheck').joinpath('demo_data', 'sample_bundle.json'); schema = r.files('duecheck').joinpath('schemas', 'ledger.schema.json'); assert demo.is_file(), 'missing demo bundle'; assert schema.is_file(), 'missing schema'"

  publish:
    runs-on: ubuntu-latest
    needs: [build, test-install]
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/duecheck

    steps:
      - name: Download distributions
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: duecheck-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: dist
