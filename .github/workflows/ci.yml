name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest ruff

      - name: Run tests
        run: pytest -v

      - name: Lint
        run: ruff check .

      - name: Verify no hardcoded school values
        run: |
          if grep -ri 'uccs\|ENGL 1308\|PHIL 1000\|HPNU 2080\|PSC 1010' duecheck/ --include='*.py' | grep -v 'help='; then
            echo "FAIL: Found hardcoded school-specific values"
            exit 1
          fi
          echo "PASS: No hardcoded school values found"
